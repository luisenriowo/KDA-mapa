<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Mapa campus PUCP - Bebederos</title>
	<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<header class="barra-sup">
		<a href="https://www.pucp.edu.pe/" class="logo" target="_blank" rel="noopener">
			<img src="https://s3.amazonaws.com/files.pucp.edu.pe/pucp-general/img-header/mapa_campus.svg" alt="Mapa campus PUCP" />
		</a>
		<span class="barra-titulo">Mapa del campus &middot; Bebederos</span>
		<button id="toggle-3d" class="btn-3d">Vista 2D</button>
	</header>

	<section class="caja-mapa">
		<div id="el-mapa"></div>

		<div class="filtro-mapa" id="panel">
			<div class="panel-head">
				<input type="text" id="buscador" class="form-control" placeholder="Buscar lugar... (ej. Biblioteca)" autocomplete="off">
				<ul id="sugerencias" class="sugerencias"></ul>
			</div>
			<div class="panel-body">
				<div class="panel-titulo">
					<h3>Búsqueda avanzada</h3>
					<button id="toggle-todos" type="button">Mostrar/ocultar todo</button>
				</div>
				<div id="filtros" class="filtros"></div>
			</div>
		</div>
	</section>

	<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
	<script src="app.js"></script>
</body>
</html>
